<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dictate</title>
<script src="client.js"></script>
<style>
body { margin: 0; padding: 20px; background: linear-gradient(135deg, #1a0a2e 0%, #2d1b69 50%, #1a0a2e 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, system-ui, sans-serif; }
.container { text-align: center; max-width: 500px; }
.mic-btn { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #7c3aed; background: #1e0a3c; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; transition: all 0.3s ease; box-shadow: 0 0 20px rgba(124,58,237,0.3); }
.mic-btn svg { width: 50px; height: 50px; fill: #a78bfa; }
.mic-btn.recording { background: #7c3aed; border-color: #8b5cf6; animation: pulse 0.8s ease-in-out infinite alternate; }
@keyframes pulse { from { box-shadow: 0 0 10px rgba(124,58,237,0.4); } to { box-shadow: 0 0 35px rgba(124,58,237,0.9); transform: scale(1.05); } }
.status { font-size: 14px; color: #a78bfa; margin-bottom: 20px; min-height: 20px; }
.result { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; min-height: 60px; max-width: 480px; margin: 0 auto; font-size: 18px; line-height: 1.5; word-wrap: break-word; border: 1px solid rgba(124,58,237,0.3); color: #e0d4f5; }
.result.empty { color: #7c6aa8; font-style: italic; }
.hint { font-size: 12px; color: #7c6aa8; margin-top: 20px; text-align: center; max-width: 400px; margin-left: auto; margin-right: auto; }
.focus-tip { background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.4); border-radius: 10px; padding: 12px 16px; margin-top: 20px; font-size: 13px; color: #c4b5e3; line-height: 1.5; text-align: center; max-width: 400px; margin-left: auto; margin-right: auto; }
.copy-btn { background: #7c3aed; color: white; border: none; padding: 10px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 12px; transition: background 0.2s; }
.copy-btn:hover { background: #8b5cf6; }
.copy-btn:active { transform: scale(0.97); }
</style>
</head>
<body>
<div class="container">
    <div class="mic-btn" id="micBtn" onclick="toggle()">
        <svg viewBox="0 0 24 24"><path d="M12 14a4 4 0 0 0 4-4V6a4 4 0 0 0-8 0v4a4 4 0 0 0 4 4z"/><path d="M19 10a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V22h2v-3.06A9 9 0 0 0 21 10h-2z"/></svg>
    </div>
    <div class="status" id="status">Tap mic to dictate</div>
    <div class="result empty" id="result">Transcribed text appears here</div>
    <button class="copy-btn" id="copyBtn" onclick="copyText()" style="display:none">Copy &amp; close</button>
    <div class="hint" id="hint">Click mic -> speak -> click again to transcribe</div>
    <div class="focus-tip"><b>If text doesn't appear:</b> click your app, press Cmd+V. Or use the Copy button above.</div>
</div>
</body>
</html>
